<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Your Gift</title>
    <link rel="stylesheet" href="styless.css">
    <link rel="stylesheet" href="welcome.css">
</head>
<body>
    <div class="welcome-container">
        <svg class="heart-svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
            <defs>
                <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7a0f3a"/>
                    <stop offset="45%" stop-color="#d4145a"/>
                    <stop offset="100%" stop-color="#ff7eb9"/>
                </linearGradient>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="6" result="b"/>
                    <feMerge>
                        <feMergeNode in="b"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <path d="M50 15 C35 -5 0 25 50 75 C100 25 65 -5 50 15 Z" fill="url(#heartGrad)" filter="url(#glow)"/>
            <path d="M50 18 C36 2 4 28 50 72 C96 28 64 2 50 18 Z" fill="rgba(255,255,255,0.08)"/>
        </svg>
        <div class="welcome-content">
            <h1>YAY! YOU ARE CUTIE</h1>
            <p>YOU ARE MY SPECIAL CUTIE</p>
            <p>DONT BE SAD IM THERE FOR YOU </p>
            <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
        </div>
    </div>
    <script src="welcome.js"></script>
</body>
</html>
